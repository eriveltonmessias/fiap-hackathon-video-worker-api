apiVersion: v1
kind: ConfigMap
metadata:
  name: video-worker-api
data:
  SERVER_PORT: "8083"
  MANAGEMENT_SERVER_PORT: "8083"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_PROCESSING_REQUESTS_GROUP_ID: "video-worker-processing-requests"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_INPUT_BUCKET: "fiapx-videos-input"
  MINIO_OUTPUT_BUCKET: "fiapx-videos-output"
  PROCESSING_TEMP_DIRECTORY: "/tmp/video-worker"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-worker-api
  labels:
    app.kubernetes.io/name: video-worker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: video-worker-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: video-worker-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/eriveltonmessias/fiap-hackathon-video-worker-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: management
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: video-worker-api
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: video-worker-api
                  key: mongodb-uri
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: video-worker-api
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: video-worker-api
                  key: minio-secret-key
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: "1"
              memory: 1Gi
              ephemeral-storage: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: processing
              mountPath: /tmp/video-worker
      volumes:
        - name: processing
          emptyDir:
            sizeLimit: 4Gi
