services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: fiapx-minio-worker
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fiapx
      MINIO_ROOT_PASSWORD: fiapx12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-worker:
    image: mongo:7.0
    container_name: fiapx-mongo-worker
    ports:
      - "27017:27017"
    volumes:
      - mongo_worker_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
  mongo_worker_data:
