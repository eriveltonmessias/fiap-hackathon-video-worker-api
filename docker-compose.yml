services:
  mongo-worker:
    image: mongo:7.0
    container_name: fiapx-mongo-worker
    ports:
      - "27017:27017"
    volumes:
      - mongo_worker_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_worker_data:
