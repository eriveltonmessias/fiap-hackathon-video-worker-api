spring:
  application:
    name: video-worker-api
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/video_worker_db}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_PROCESSING_REQUESTS_GROUP_ID:video-worker-processing-requests}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
      immediate-stop: false
      observation-enabled: true
    admin:
      operation-timeout: ${KAFKA_HEALTH_TIMEOUT:3s}
      close-timeout: ${KAFKA_HEALTH_TIMEOUT:3s}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

logging:
  structured:
    format:
      console: ecs

app:
  kafka:
    retry:
      max-attempts: ${KAFKA_PROCESSING_MAX_ATTEMPTS:3}
      interval: ${KAFKA_PROCESSING_RETRY_INTERVAL:1s}
      dlq-publish-timeout: ${KAFKA_DLQ_PUBLISH_TIMEOUT:10s}
  outbox:
    scheduling-enabled: ${OUTBOX_SCHEDULING_ENABLED:true}
    initial-delay: ${OUTBOX_INITIAL_DELAY:5s}
    fixed-delay: ${OUTBOX_FIXED_DELAY:5s}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    publish-timeout: ${OUTBOX_PUBLISH_TIMEOUT:10s}
  processing:
    temporary-directory: ${PROCESSING_TEMP_DIRECTORY:${java.io.tmpdir}}
  ffmpeg:
    executable: ${FFMPEG_EXECUTABLE:ffmpeg}
    timeout: ${FFMPEG_TIMEOUT:5m}
    frames-per-second: ${FFMPEG_FRAMES_PER_SECOND:1}
    max-frames: ${FFMPEG_MAX_FRAMES:10000}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:fiapx}
      secret-key: ${MINIO_SECRET_KEY:fiapx12345}
      input-bucket: ${MINIO_INPUT_BUCKET:fiapx-videos-input}
      output-bucket: ${MINIO_OUTPUT_BUCKET:fiapx-videos-output}
      initialize-buckets: ${MINIO_INITIALIZE_BUCKETS:true}

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT:8083}}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,mongo,kafka,minio
