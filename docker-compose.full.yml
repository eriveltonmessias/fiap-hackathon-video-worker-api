name: fiapx-local

services:
  customer-auth-api:
    build:
      context: ../customer-auth-api
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USERNAME: fiapx
      DB_PASSWORD: fiapx
      JWT_SECRET: local-development-jwt-secret-change-me-1234567890
      INTERNAL_API_KEY: local-internal-api-key
    depends_on:
      postgres-auth:
        condition: service_healthy

  video-manager-api:
    build:
      context: ../video-manager-api
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-video:5432/video_db
      DB_USERNAME: fiapx
      DB_PASSWORD: fiapx
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: fiapx
      MINIO_SECRET_KEY: fiapx12345
      CUSTOMER_AUTH_API_URL: http://customer-auth-api:8081
      INTERNAL_API_KEY: local-internal-api-key
      JWT_SECRET: local-development-jwt-secret-change-me-1234567890
      JWT_ISSUER: customer-auth-api
    depends_on:
      customer-auth-api:
        condition: service_started
      postgres-video:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

  video-worker-api:
    build:
      context: .
    ports:
      - "8083:8083"
    environment:
      MONGODB_URI: mongodb://mongo-worker:27017/video_worker_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: fiapx
      MINIO_SECRET_KEY: fiapx12345
    depends_on:
      mongo-worker:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy

  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: fiapx
      POSTGRES_PASSWORD: fiapx
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiapx -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-video:
    image: postgres:16
    environment:
      POSTGRES_DB: video_db
      POSTGRES_USER: fiapx
      POSTGRES_PASSWORD: fiapx
    ports:
      - "5434:5432"
    volumes:
      - postgres_video_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiapx -d video_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-worker:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_worker_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fiapx
      MINIO_ROOT_PASSWORD: fiapx12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka-native:4.0.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "19092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_auth_data:
  postgres_video_data:
  mongo_worker_data:
  minio_data:
  kafka_data:
